# ===================================================================
# 1. CONFIGURACIÓN BÁSICA DEL SERVIDOR
# ===================================================================
# El nombre oficial de nuestra aplicación
spring.application.name=transportes
# El puerto o "puerta" por donde el servidor escuchará peticiones (estándar 8080)
server.port=8080

# Límites para no saturar el servidor al subir archivos: 
# Permite que los usuarios suban PDFs de hasta 10 Megabytes por archivo/petición.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# 2. CONEXIÓN A LA BASE DE DATOS (ORACLE CLOUD WALLET)
# ===================================================================
# Aquí conectamos nuestro código con la base de datos en la nube.
# Usamos una variable ${TNS_ADMIN_PATH} para inyectar la ubicación de la "billetera de seguridad" 
# de forma dinámica desde Docker, sin dejar contraseñas quemadas en el código.
spring.datasource.url=jdbc:oracle:thin:@cloudnative_medium?TNS_ADMIN=${TNS_ADMIN_PATH}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuramos JPA para que "hable" el idioma específico de Oracle (Dialect)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# Instrucción para que actualice las tablas de la BD automáticamente si hay cambios en las clases Java
spring.jpa.hibernate.ddl-auto=update
# Enciende un "visor" en la consola para ver qué consultas SQL está ejecutando por debajo
spring.jpa.show-sql=true

# ===================================================================
# 3. ALMACENAMIENTO TEMPORAL (AWS EFS / LOCAL)
# ===================================================================
# Esta carpeta temporal se usa para procesar los PDFs antes de enviarlos a S3.
# Si la variable RUTA_EFS existe (ej: en Docker/AWS), usará esa. 
# Si no existe (ej: en desarrollo local), usará por defecto "C:/temp/efs".
ruta.almacenamiento.temporal=${RUTA_EFS:C:/temp/efs}

# ===================================================================
# 4. ALMACENAMIENTO DEFINITIVO EN LA NUBE (AWS S3)
# ===================================================================
# El nombre del "balde" (Bucket) en Amazon S3 donde se guardarán finalmente las guías
aws.s3.bucket=${AWS_S3_BUCKET}

# Las llaves de acceso a tu cuenta de AWS. 
# Se inyectan como variables de entorno por seguridad, evitando filtraciones en GitHub.
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
# La región geográfica donde está tu servidor AWS (por defecto us-east-1)
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}

# Desactiva una función automática de AWS que suele generar errores lentos al correr en local o Docker
spring.cloud.aws.stack.auto=false

# ===================================================================
# 5. SEGURIDAD CON AZURE AD B2C (OAUTH2 RESOURCE SERVER)
# ===================================================================

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://duocazurecloudn.b2clogin.com/tfp/76b75f28-e0f9-4305-9b31-f6f69d880cfe/b2c_1_duocdemoazure_registro_login/v2.0/

# ===================================================================
# 6. CONFIGURACIÓN DE RABBITMQ (DOCKER / AMQP)
# ===================================================================
# Configuracion del CLUSTER de RabbitMQ para alta disponibilidad (Nodos 1 y 2)
spring.rabbitmq.addresses=localhost:5672,localhost:5673
# NOTA: Para conexiones seguras (TLS), usualmente se usa el puerto 5671 en RabbitMQ
spring.rabbitmq.port=5671
spring.rabbitmq.username=user
spring.rabbitmq.password=password

# Seguridad TLS / SSL 
# Descomentar estas lineas una vez que tengas los certificados .jks listos para probar
# spring.rabbitmq.ssl.enabled=true
# spring.rabbitmq.ssl.key-store=classpath:keystore.jks
# spring.rabbitmq.ssl.key-store-password=password
# spring.rabbitmq.ssl.trust-store=classpath:truststore.jks
# spring.rabbitmq.ssl.trust-store-password=password

# ===================================================================
# 7. MONITOREO CON SPRING BOOT ACTUATOR
# ===================================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always